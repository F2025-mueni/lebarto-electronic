<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lebarto Electronics - Suppliers</title>


<link rel="stylesheet" href="suppliers.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body>


<!-- ================= SIDEBAR ================= -->

<div class="sidebar">


<h2>
<i class="fa-solid fa-store"></i>
Lebarto
</h2>


<a href="admin.html">

<i class="fa-solid fa-chart-line"></i>
Dashboard

</a>


<a href="products.html">

<i class="fa-solid fa-box"></i>
Products

</a>


<a href="categories.html">

<i class="fa-solid fa-list"></i>
Categories

</a>


<a href="suppliers.html" class="active">

<i class="fa-solid fa-truck"></i>
Suppliers

</a>


<a href="customers.html">

<i class="fa-solid fa-users"></i>
Customers

</a>


<a href="sales.html">

<i class="fa-solid fa-cart-shopping"></i>
Sales

</a>


<a href="#" id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>
Logout

</a>


</div>





<!-- ================= MAIN ================= -->

<div class="main">


<div class="topbar">


<h1>
Supplier Management
</h1>


<div class="admin-info">

<i class="fa-solid fa-user-shield"></i>

<span id="adminName">
Admin
</span>

</div>


</div>





<!-- ================= CARDS ================= -->


<div class="cards">


<div class="card">


<i class="fa-solid fa-truck"></i>


<div>

<h3>Total Suppliers</h3>

<p id="totalSuppliers">
0
</p>

</div>


</div>



<div class="card">


<i class="fa-solid fa-phone"></i>


<div>

<h3>Active Suppliers</h3>

<p id="activeSuppliers">
0
</p>

</div>


</div>



</div>






<!-- ================= ACTION BAR ================= -->


<div class="actions">


<input
type="text"
id="searchSupplier"
placeholder="Search supplier...">



<button id="addSupplierBtn">


<i class="fa-solid fa-plus"></i>

Add Supplier


</button>


</div>







<!-- ================= TABLE ================= -->


<div class="table-container">


<table>


<thead>

<tr>

<th>#</th>

<th>Supplier Name</th>

<th>Phone</th>

<th>Email</th>

<th>Address</th>

<th>Date Added</th>

<th>Actions</th>


</tr>


</thead>



<tbody id="supplierTable">


</tbody>


</table>


</div>


</div>








<!-- ================= MODAL ================= -->


<div class="modal" id="supplierModal">


<div class="modal-content">


<span class="close" id="closeModal">

&times;

</span>



<h2 id="modalTitle">

Add Supplier

</h2>




<form id="supplierForm">


<label>
Supplier Name
</label>


<input
type="text"
id="supplierName"
required>




<label>
Phone Number
</label>


<input
type="text"
id="supplierPhone">




<label>
Email
</label>


<input
type="email"
id="supplierEmail">





<label>
Address
</label>


<textarea
id="supplierAddress"
rows="4">

</textarea>






<div class="modal-buttons">


<button
type="submit"
class="save-btn">

Save Supplier

</button>



<button
type="button"
id="cancelBtn"
class="cancel-btn">

Cancel

</button>


</div>



</form>


</div>


</div>







<script type="module" src="suppliers.js"></script>


</body>

</html>
